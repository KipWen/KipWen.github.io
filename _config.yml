# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Salty_fish
subtitle: "副标题测试"
description: |
  “一个私人角落，存放着现在的我，写给未来的你。”
  Short, intimate, and creates a nice dialogue with the future self.
keywords:
author: KipWen
language: en
timezone: "Asia/Shanghai"

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://kipwen.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ""

# Home page setting
index_generator:
  path: ""
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: "mtime"

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
# theme: landscape
theme: hexo-theme-fengye

# Deployment
deploy:
  type: git
  repo: https://github.com/KipWen/KipWen.github.io.git
  branch: main
# Search / hexo-generator-searchdb
# search:
#   path: search.xml
#   field: post
#   content: true
#   format: html

# Search / hexo-generator-searchdb
# See: https://github.com/next-theme/hexo-generator-searchdb
search:
  path: search.xml # [必须] 数据文件的路径，保持默认即可
  field: post # [必须] 搜索范围，post指搜索文章
  content: false # [可选] 是否包含文章内容
  format: xml # [可选] 文件格式，可以是 xml 或 json


